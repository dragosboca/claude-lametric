# Copy to ~/.config/claude-lametric/config.toml and fill in your values.
# Every field can also be set via env var (see README) — handy for hooks.

[local]
# Instant notification popups over your LAN.
# IP: LaMetric app -> Settings -> Wi-Fi -> IP Address
# api_key: developer.lametric.com -> your account -> Devices -> API key
ip = "192.168.1.50"
api_key = "your-device-api-key"
enabled = true

[indicator]
# Persistent status frames via the "My Data DIY" app, Local Push (HTTP Push).
# Install "My Data DIY" on your clock, set its push method to HTTP/Local Push,
# and it shows a push URL + access token. Use the HTTP form (http, port 8080).
# The endpoint authenticates with HTTP Basic: user "dev", password = this token
# (used verbatim) — the client handles that for you; just paste the token here.
#   push_url:  http://<device-ip>:8080/api/v2/widget/update/com.lametric.diy.devwidget/<WIDGET_ID>
push_url = "http://192.168.1.50:8080/api/v2/widget/update/com.lametric.diy.devwidget/XXXX"
access_token = "your-diy-app-access-token"
enabled = true

[behavior]
notify_on_stop = true        # local popup when Claude finishes a turn
notify_on_permission = true  # local popup when Claude needs attention/permission
context_limit = 200000       # token budget for the context goal frame
idle_after_minutes = 30      # forget sessions silent longer than this

[icons]
# Pick IDs at https://developer.lametric.com/icons ('a' = animation, 'i' = static).
working = "a2740"
waiting = "a4849"
idle    = "i120"
done    = "a1054"
tokens  = "i555"
error   = "a9335"
